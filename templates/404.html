{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 Không tìm thấy trang - TOÁN GIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background-color: #0B1121;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: radial-gradient(circle at top right, rgba(14, 165, 233, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1), transparent 40%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        .text-gradient {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glow-text {
            text-shadow: 0 0 30px rgba(56, 189, 248, 0.6);
        }
    </style>
</head>
<body class="selection:bg-blue-500 selection:text-white overflow-x-hidden w-full">
    
    <div class="glass-card p-10 md:p-16 rounded-3xl max-w-2xl w-full mx-4 text-center relative overflow-hidden">
        <div class="absolute -top-20 -left-20 w-40 h-40 bg-blue-600/30 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-20 -right-20 w-40 h-40 bg-purple-600/30 rounded-full blur-3xl"></div>

        <div class="relative z-10">
            <div class="mb-4">
                <i class="bi bi-geo-alt-fill text-6xl text-gray-500 opacity-50"></i>
            </div>
            
            <h1 class="text-8xl md:text-9xl font-black mb-2 text-gradient glow-text tracking-tighter">404</h1>
            <h2 class="text-2xl md:text-4xl font-bold mb-4 text-white">Oops! Lạc đường rồi!</h2>
            
            <p class="text-gray-400 mb-10 text-lg leading-relaxed">
                Hệ thống WebGIS không thể định vị được tọa độ trang web này. <br>
                Có thể trang đã bị xóa, bị đổi tên hoặc bạn đã gõ sai đường dẫn.
            </p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="{% url 'trang_chu' %}" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-xl transition transform hover:-translate-y-1 shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2">
                    <i class="bi bi-house-door-fill"></i> Về Trang Chủ
                </a>
                <button onclick="window.history.back()" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-xl transition transform hover:-translate-y-1 border border-slate-500 flex items-center justify-center gap-2">
                    <i class="bi bi-arrow-left"></i> Trở Lại
                </button>
            </div>
        </div>
    </div>

</body>
</html>
