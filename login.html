<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Toán GIS System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .brand-logo {
            text-align: center; margin-bottom: 30px;
            color: white; font-size: 1.8rem; font-weight: 800;
        }
        .brand-logo span { color: #3b82f6; }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 12px 15px; border-radius: 12px;
            margin-bottom: 20px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #3b82f6; color: white; box-shadow: none;
        }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.4); }

        .btn-login {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white; width: 100%; padding: 12px; border: none;
            border-radius: 12px; font-weight: 700; font-size: 1rem;
            transition: 0.3s; margin-top: 10px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4); }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5; font-size: 0.9rem; border-radius: 10px;
        }
        
        .footer-text { text-align: center; color: rgba(255,255,255,0.4); margin-top: 20px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">
            <i class="bi bi-grid-3x3-gap-fill me-2"></i>TOÁN <span>GIS</span>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <div>{{ message }}</div>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="text-white-50 small fw-bold mb-1">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-white-10 text-white-50 border-end-0" style="border-radius: 12px 0 0 12px; border-color: rgba(255,255,255,0.1);"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control border-start-0 ps-0 mt-0" placeholder="Nhập username..." required style="border-radius: 0 12px 12px 0;">
                </div>
            </div>

            <div class="mb-4">
                <label class="text-white-50 small fw-bold mb-1">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-white-10 text-white-50 border-end-0" style="border-radius: 12px 0 0 12px; border-color: rgba(255,255,255,0.1);"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control border-start-0 ps-0 mt-0" placeholder="Nhập mật khẩu..." required style="border-radius: 0 12px 12px 0;">
                </div>
            </div>

            <button type="submit" class="btn-login">
                Đăng Nhập Hệ Thống
            </button>
        </form>

        <div class="footer-text">
            &copy; 2026 Hệ thống quản lý giáo dục Toán GIS
        </div>
    </div>

</body>
</html>
