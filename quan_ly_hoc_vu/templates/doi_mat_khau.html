{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đổi Mật Khẩu - Toán GIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { 
            background-color: #0B1121; color: #ffffff; font-family: 'Segoe UI', Tahoma, sans-serif;
            background-image: radial-gradient(circle at top left, rgba(59, 130, 246, 0.1), transparent 50%),
                              radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.1), transparent 50%);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
        .input-dark {
            background-color: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1);
            color: white; transition: all 0.3s ease;
        }
        .input-dark:focus {
            border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card rounded-3xl p-8 md:p-10 w-full max-w-md relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500/20 rounded-full blur-2xl"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-emerald-500/20 rounded-full blur-2xl"></div>

        <div class="relative z-10">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-blue-500/30 mb-4">
                    <i class="bi bi-shield-lock-fill text-3xl text-white"></i>
                </div>
                <h2 class="text-2xl font-bold text-white tracking-wide">Đổi Mật Khẩu</h2>
                <p class="text-gray-400 text-sm mt-1">Bảo mật tài khoản <span class="font-bold text-blue-400">{{ user.username }}</span></p>
            </div>

            {% if messages %}
                <div class="mb-6">
                    {% for message in messages %}
                        <div class="p-3 rounded-lg text-sm font-semibold flex items-center gap-2 {% if message.tags == 'error' %}bg-red-500/10 text-red-400 border border-red-500/20{% else %}bg-green-500/10 text-green-400 border border-green-500/20{% endif %}">
                            <i class="bi {% if message.tags == 'error' %}bi-exclamation-triangle-fill{% else %}bi-check-circle-fill{% endif %}"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST" action="" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5"><i class="bi bi-key-fill text-gray-500 me-1"></i>Mật khẩu cũ</label>
                    <input type="password" name="old_password" required placeholder="Nhập mật khẩu hiện tại..." 
                           class="input-dark w-full px-4 py-3 rounded-xl text-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5"><i class="bi bi-shield-plus text-gray-500 me-1"></i>Mật khẩu mới</label>
                    <input type="password" name="new_password1" required placeholder="Mật khẩu mới (Tối thiểu 8 ký tự)" 
                           class="input-dark w-full px-4 py-3 rounded-xl text-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5"><i class="bi bi-check2-all text-gray-500 me-1"></i>Xác nhận mật khẩu mới</label>
                    <input type="password" name="new_password2" required placeholder="Nhập lại mật khẩu mới" 
                           class="input-dark w-full px-4 py-3 rounded-xl text-sm">
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-500/20 transition-all hover:-translate-y-1">
                        CẬP NHẬT MẬT KHẨU
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center">
                <a href="javascript:history.back()" class="text-gray-400 hover:text-white text-sm font-medium transition-colors">
                    <i class="bi bi-arrow-left me-1"></i> Quay lại trang trước
                </a>
            </div>
        </div>
    </div>

</body>
</html>
